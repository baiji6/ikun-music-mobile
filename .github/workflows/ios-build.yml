name: Build iOS IPA

on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'src/**'
      - 'package.json'
      - '.github/workflows/ios-build.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install npm dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build iOS Archive (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace ikunmusicmobile.xcworkspace \
            -scheme ikunmusicmobile \
            -configuration Release \
            -archivePath ./build/ikunmusicmobile.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Create unsigned IPA
        run: |
          cd ios
          mkdir -p Payload
          cp -r ./build/ikunmusicmobile.xcarchive/Products/Applications/ikunmusicmobile.app Payload/
          zip -r ikun-music-mobile-v${{ steps.version.outputs.version }}-ios-unsigned.ipa Payload
          rm -rf Payload
          ls -lh ikun-music-mobile-v${{ steps.version.outputs.version }}-ios-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: ios/ikun-music-mobile-v${{ steps.version.outputs.version }}-ios-unsigned.ipa
          retention-days: 7