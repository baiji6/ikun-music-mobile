name: Build & Release iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ==================== iOS 构建 ====================
  iOS:
    name: Build iOS
    runs-on: macos-14
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install npm dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          gem install cocoapods -v 1.15.2
          cd ios && pod install --verbose

      - name: Get package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build iOS (unsigned)
        run: |
          cd ios
          echo "Building with xcodebuild..."
          set -o pipefail
          xcodebuild \
            -workspace ikunmusicmobile.xcworkspace \
            -scheme ikunmusicmobile \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -200
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "xcodebuild failed with exit code $BUILD_EXIT"
            exit $BUILD_EXIT
          fi
          # Find the built .app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "ikunmusicmobile.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find built .app"
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null
            exit 1
          fi
          echo "App found at: $APP_PATH"
          # Create IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ikun-music-mobile-v${{ steps.version.outputs.version }}-ios-unsigned.ipa Payload
          rm -rf Payload
          ls -lh ikun-music-mobile-v${{ steps.version.outputs.version }}-ios-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/*.ipa

  # ==================== 发布 ====================
  Release:
    name: Release iOS
    runs-on: ubuntu-latest
    needs: [iOS]
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Download IPA Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ./artifacts

      - name: Get package version
        run: node -p -e '`PACKAGE_VERSION=${require("./package.json").version}`' >> $GITHUB_ENV

      - name: Release iOS (Pre-release)
        shell: bash
        run: |
          ASSETS=""
          for f in artifacts/*.ipa; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done
          echo "Assets to upload: $ASSETS"
          TAG="v${{ env.PACKAGE_VERSION }}-ios"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release exists, uploading assets..."
            gh release upload "$TAG" $ASSETS --clobber
          else
            echo "Creating new iOS release..."
            git tag -f "$TAG"
            git push -f origin "$TAG"
            gh release create "$TAG" \
              --prerelease \
              --title "v${{ env.PACKAGE_VERSION }} (iOS)" \
              --notes "iOS 未签名 IPA" \
              $ASSETS
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}